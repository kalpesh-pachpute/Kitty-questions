services:
  app:
    build: .
    container_name: kitty-app
    ports:
      - "3000:3000"
    environment:
      DB_STRING: mongodb://mongo:27017
      PORT: 3000
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: kitty-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: